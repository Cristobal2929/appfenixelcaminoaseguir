name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write        # necesario para publicar el Release descargable

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build APK (debug)
        run: gradle assembleDebug --no-daemon
        working-directory: .

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      # Publica el APK como Release "latest" -> enlace público y estable:
      # https://github.com/Cristobal2929/appfenixelcaminoaseguir/releases/download/latest/app-debug.apk
      - name: Publicar APK descargable (release "latest")
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag || true
          gh release create latest app/build/outputs/apk/debug/app-debug.apk \
            --title "Teshuá — App" \
            --notes "Descarga e instala la app Teshuá. Camino de la Teshuá, el retorno del alma."
